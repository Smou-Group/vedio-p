<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#050b14;
  --bg2:#0a1c33;
  --glass: rgba(255,255,255,.08);
  --border: rgba(255,255,255,.18);
  --text:#ffffff;
  --muted:rgba(255,255,255,.75);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Tajawal",sans-serif;
  color:var(--text);
  background:
  radial-gradient(800px 400px at 20% 20%, rgba(0,150,255,.15), transparent 60%),
  linear-gradient(180deg,var(--bg1),var(--bg2));
  min-height:100vh;
}
.wrap{max-width:1100px;margin:auto;padding:20px}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--glass);
  border:1px solid var(--border);
  padding:14px;
  border-radius:18px;
  backdrop-filter:blur(14px);
}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:45px}
.pageTitle{text-align:center}
.pageTitle h1{margin:0;font-size:18px}
.branch{font-size:12px;color:var(--muted)}

.card{
  margin-top:20px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(14px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}

.videoIcon{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.videoIcon:hover{transform:translateY(-5px); box-shadow:0 15px 35px rgba(0,0,0,.4);}
.videoIcon img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}
.caption{
  padding:10px;
  text-align:center;
  font-weight:700;
}

.playerWrap{display:none;margin-top:20px}
.playerBox{
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
}
.playerTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:rgba(255,255,255,.06);
}
iframe{
  width:100%;
  aspect-ratio:9/16;
  border:0;
}

button{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  padding:6px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}
button:hover{background:rgba(255,255,255,.25)}
</style>
</head>

<body>

// استخراج ID من Shorts
function getYouTubeId(url){
  const u = new URL(url);
  if(u.pathname.includes("/shorts/")){
    return u.pathname.split("/shorts/")[1].split("?")[0];
  }
  if(u.searchParams.get("v")) return u.searchParams.get("v");
  return "";
}

const grid=document.getElementById("grid");
const playerWrap=document.getElementById("playerWrap");
const iframeBox=document.getElementById("iframeBox");
const videoTitle=document.getElementById("videoTitle");

function render(){
  grid.innerHTML="";
  videos.forEach((v,i)=>{
    const id=getYouTubeId(v.url);
    const thumb=`https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    grid.innerHTML+=`
      <div class="videoIcon" onclick="openVideo(${i})">
        <img src="${thumb}">
        <div class="caption">${v.name}</div>
      </div>`;
  });
}

function openVideo(index){
  const v=videos[index];
  const id=getYouTubeId(v.url);
  videoTitle.textContent=v.name;
  iframeBox.innerHTML=`
    <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0"
    allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  grid.style.display="none";
  playerWrap.style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
}

function backToList(){
  iframeBox.innerHTML="";
  playerWrap.style.display="none";
  grid.style.display="grid";
}
